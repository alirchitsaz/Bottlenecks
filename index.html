<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MagicFolder | Simple. Smart. Secure.</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M15,35 L40,35 Q44,35 46,39 L50,45 Q52,50 58,50 L85,50 L85,85 L15,85 Z' fill='%234f46e5' opacity='0.2'/%3E%3Cline x1='70' y1='25' x2='85' y2='45' stroke='%230f172a' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='70' cy='25' r='3' fill='%234f46e5'/%3E%3C/svg%3E">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #4f46e5; --primary-soft: rgba(79, 70, 229, 0.08); --bg: #ffffff; --surface: #f8fafc; --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0; --success: #10b981; --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* NAV */
        nav { padding: 24px 0; position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo-nav { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.8rem; cursor: pointer; text-decoration: none; color: inherit; }
        .logo-nav svg { width: 44px; height: 44px; }
        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-links a { color: var(--text-main); font-weight: 700; text-decoration: none; font-size: 1.05rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--primary); }

        /* HERO - SLIDESHOW ENABLED */
        .hero { padding: 80px 0 40px; text-align: center; min-height: 480px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-size: clamp(2.5rem, 7vw, 5.2rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.06em; margin-bottom: 24px; transition: opacity 0.5s ease; min-height: 2.2em; }
        .hero p { font-size: 1.3rem; color: var(--text-muted); max-width: 780px; margin: 0 auto 48px; line-height: 1.6; transition: opacity 0.5s ease; min-height: 4.8em; }

        /* ANIMATION STAGE */
        .demo-stage { background: var(--surface); border: 1px solid var(--border); border-radius: 40px; max-width: 1100px; margin: 0 auto 60px; padding: 100px 40px; position: relative; overflow: visible; width: 100%; }
        .demo-flow { display: flex; justify-content: center; align-items: center; gap: 80px; position: relative; z-index: 2; pointer-events: none; }
        
        /* FOLDERS */
        .folder-node { width: 170px; height: 120px; background: white; border: 1.5px solid var(--border); position: relative; border-radius: 0 16px 16px 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s ease; opacity: 0.6; }
        .folder-node::before { content: ""; position: absolute; top: -12px; left: -1.5px; width: 60px; height: 12px; background: inherit; border: inherit; border-bottom: none; border-radius: 8px 8px 0 0; }
        
        .brand-center { text-align: center; display: flex; flex-direction: column; align-items: center; width: 340px; position: relative; z-index: 10; }
        .brand-center svg { width: 200px; height: 200px; margin-bottom: 4px; overflow: visible; }
        .brand-center h4 { font-weight: 800; font-size: 2.1rem; letter-spacing: -0.04em; }

        .dest-stack { display: flex; flex-direction: column; gap: 35px; width: 180px; }
        .dest-folder { height: 55px; background: white; border: 1.5px solid var(--border); position: relative; border-radius: 0 10px 10px 10px; display: flex; align-items: center; padding-left: 45px; opacity: 0.6; transition: 0.4s; }
        .dest-folder::before { content: ""; position: absolute; top: -8px; left: -1.5px; width: 30px; height: 8px; background: inherit; border: inherit; border-bottom: none; border-radius: 5px 5px 0 0; }
        .dest-folder span { font-weight: 800; font-size: 0.8rem; color: var(--text-muted); }
        .dest-folder i { position: absolute; left: 15px; color: #94a3b8; }

        /* WAND ANIMATION */
        .magic-wand { transform-origin: 68px 22px; }
        @keyframes wandWave { 0%, 45%, 55%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-30deg); } }
        @keyframes sparkPulse { 0%, 45%, 55%, 100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.6); opacity: 1; filter: drop-shadow(0 0 10px var(--primary)); } }
        .agent-anim .magic-wand { animation: wandWave 8s infinite linear; }
        .agent-anim .spark-burst { animation: sparkPulse 8s infinite linear; transform-origin: 68px 22px; }

        /* 3-IN, 3-OUT DOC UNITS */
        .doc-unit { position: absolute; background: white; border: 1.5px solid #cbd5e1; border-radius: 4px; z-index: 1; opacity: 0; pointer-events: none; width: 40px; height: 50px; }
        
        @keyframes groupIn { 0% { left: 5%; opacity: 0; transform: translateY(-50%) rotate(-10deg); } 10% { opacity: 1; } 42% { left: 42%; opacity: 1; transform: translateY(-50%) rotate(0deg); } 48% { opacity: 0; left: 50%; } 100% { opacity: 0; } }
        @keyframes split1 { 0%, 55% { left: 50%; opacity: 0; top: 50%; } 60% { opacity: 1; border-color: var(--primary); } 90% { left: 86%; top: 25%; opacity: 1; transform: translate(-50%, -50%) scale(0.65); } 100% { opacity: 0; } }
        @keyframes split2 { 0%, 55% { left: 50%; opacity: 0; top: 50%; } 60% { opacity: 1; border-color: var(--primary); } 90% { left: 86%; top: 50%; opacity: 1; transform: translate(-50%, -50%) scale(0.65); } 100% { opacity: 0; } }
        @keyframes split3 { 0%, 55% { left: 50%; opacity: 0; top: 50%; } 60% { opacity: 1; border-color: var(--primary); } 90% { left: 86%; top: 73%; opacity: 1; transform: translate(-50%, -50%) scale(0.65); } 100% { opacity: 0; } }

        .doc-m1 { animation: groupIn 8s infinite linear; top: 50%; }
        .doc-m2 { animation: groupIn 8s infinite linear; top: 50%; animation-delay: 0.5s; }
        .doc-m3 { animation: groupIn 8s infinite linear; top: 50%; animation-delay: 1.0s; }
        
        .doc-c1 { animation: split1 8s infinite linear; }
        .doc-c2 { animation: split2 8s infinite linear; animation-delay: 0.5s; }
        .doc-c3 { animation: split3 8s infinite linear; animation-delay: 1.0s; }

        /* REACTION TRIGGERS */
        @keyframes iActive { 0%, 42% { transform: scale(1.05); border-color: var(--primary); opacity: 1; background: #f8faff; } 47%, 100% { transform: scale(1); opacity: 0.6; } }
        @keyframes bJump { 0%, 42%, 58%, 100% { transform: scale(1); } 50% { transform: scale(1.15); filter: drop-shadow(0 15px 35px var(--primary-soft)); } }
        @keyframes dSnap { 0%, 85% { border-color: var(--border); background: white; opacity: 0.6; } 90%, 100% { border-color: var(--success); background: #f0fdf4; opacity: 1; transform: scale(1.1); } }
        
        .intake-anim { animation: iActive 8s infinite linear; }
        .agent-anim { animation: bJump 8s infinite linear; }
        .dest-anim { animation: dSnap 8s infinite linear; }

        /* BUTTONS */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 12px; background: var(--text-main); color: white; padding: 20px 52px; border-radius: 100px; font-weight: 800; transition: 0.3s; cursor: pointer; border: none; font-size: 1.25rem; text-decoration: none; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 10px 25px var(--primary-soft); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-main); }

        /* ECOSYSTEM BENTO GRID */
        .ecosystem-section { padding: 40px 0 80px; }
        .ecosystem-header { text-align: center; max-width: 700px; margin: 0 auto 60px; }
        .ecosystem-header h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.04em; }
        .ecosystem-header p { font-size: 1.2rem; color: var(--text-muted); line-height: 1.6; }
        
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .bento-card { background: white; border: 1px solid var(--border); border-radius: 32px; padding: 40px; transition: 0.3s ease; display: flex; flex-direction: column; align-items: flex-start; }
        .bento-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-4px); }
        .bento-icon { width: 56px; height: 56px; background: var(--surface); border-radius: 16px; display: flex; justify-content: center; align-items: center; margin-bottom: 24px; color: var(--primary); }
        .bento-card h3 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
        .bento-card p { color: var(--text-muted); line-height: 1.6; font-size: 1.05rem; }

        /* WIZARD SECTION */
        .wizard-section { padding: 80px 0; border-top: 1px solid var(--border); }
        
        .persona-bar { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
        .persona-chip { -webkit-appearance: none; appearance: none; font-family: inherit; font-size: 1rem; background: #fff; border: 1px solid var(--border); padding: 14px 28px; border-radius: 100px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        .persona-chip:hover { border-color: var(--primary); color: var(--primary); }
        .persona-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 10px 20px var(--primary-soft); }
        
        .task-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
        .audit-item { display: flex; gap: 16px; padding: 24px; background: var(--surface); border: 2px solid transparent; border-radius: 16px; cursor: pointer; align-items: center; text-align: left; transition: 0.2s; }
        .audit-item:hover { background: white; border-color: #cbd5e1; }
        .audit-item.selected { border-color: var(--primary); background: white; box-shadow: 0 10px 25px var(--primary-soft); }
        .check-box { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: grid; place-items: center; flex-shrink: 0; background: white; }
        .audit-item.selected .check-box { background: var(--primary); border-color: var(--primary); }

        .cta-card { background: var(--surface); padding: 48px; border-radius: 40px; border: 1px solid var(--border); text-align: center; max-width: 850px; margin: 0 auto; position: relative; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        input { padding: 20px; border-radius: 14px; border: 1px solid var(--border); font-size: 1.1rem; width: 100%; outline: none; transition: 0.2s; background: white; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
        .error-msg { display: none; color: #ef4444; font-weight: 700; margin-bottom: 20px; font-size: 1.05rem; background: #fef2f2; padding: 12px; border-radius: 12px; border: 1px solid #fca5a5; }

        /* RESULTS HERO */
        .results-hero { background: #0f172a; color: white; padding: 80px 40px; border-radius: 48px; text-align: center; margin-bottom: 60px; }
        .big-save { font-size: clamp(4rem, 10vw, 7rem); color: #818cf8; font-weight: 800; line-height: 1; letter-spacing: -3px; margin: 20px 0; }

        /* DYNAMIC PRICING GRID */
        .pricing-section { padding: 60px 0; }
        .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
        .pricing-card { background: white; border: 1px solid var(--border); border-radius: 32px; padding: 40px; text-align: left; display: flex; flex-direction: column; position: relative; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .pricing-card:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); }
        .pricing-card.popular { border: 2px solid var(--primary); box-shadow: 0 15px 35px var(--primary-soft); }
        .pricing-card.ai-recommended { border: 2.5px solid var(--primary); transform: scale(1.03); box-shadow: 0 25px 50px -12px rgba(79, 70, 229, 0.25); z-index: 10; }
        .pricing-card.dimmed { opacity: 0.5; transform: scale(0.97); }
        .pricing-card.dimmed:hover { opacity: 1; transform: scale(1); z-index: 11; }
        
        .recommended-badge { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 8px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .popular-badge { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 6px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        
        .tier-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; color: var(--text-main); }
        .tier-desc { color: var(--text-muted); font-size: 1rem; margin-bottom: 24px; line-height: 1.5; min-height: 3em; }
        .tier-price { font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; color: var(--text-main); }
        .tier-setup { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
        .feature-list { list-style: none; margin-bottom: 40px; flex-grow: 1; }
        .feature-list li { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; font-weight: 600; color: var(--text-main); }
        .feature-list i { color: var(--success); flex-shrink: 0; margin-top: 2px; }

        /* WORKSPACE CREATION UI */
        .workspace-input-group { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: white; transition: 0.2s; }
        .workspace-input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
        .workspace-input-group input { border: none; border-radius: 0; box-shadow: none; flex-grow: 1; margin: 0; }
        .workspace-suffix { padding: 0 20px; background: var(--surface); color: var(--text-muted); font-weight: 600; border-left: 1px solid var(--border); height: 100%; display: flex; align-items: center; }

        /* FOOTER */
        footer { padding: 80px 0; border-top: 1px solid var(--border); background: #fff; margin-top: 80px;}
        .footer-grid { display: grid; grid-template-columns: 2fr 3fr; gap: 60px; align-items: center; }
        .partner-links { display: flex; flex-wrap: wrap; gap: 40px; opacity: 0.6; }
        .partner-links a { color: var(--text-main); font-weight: 800; text-decoration: none; transition: 0.2s; font-size: 1.1rem; }
        .partner-links a:hover { color: var(--primary); opacity: 1; transform: translateY(-2px); }

        .hidden { display: none !important; }
        .fade-in { animation: fadeInUp 0.7s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBILE FIXES */
        @media(max-width: 768px) { 
            .hero { min-height: auto; padding-top: 40px; }
            .hero h1 { font-size: 2.5rem; min-height: 3em; }
            .hero p { font-size: 1.1rem; min-height: 5em; }
            .demo-flow { flex-direction: column; gap: 40px; }
            .dest-stack { flex-direction: row; width: 100%; gap: 10px; }
            .dest-folder { padding: 0; justify-content: center; flex: 1; height: 60px; }
            .dest-folder span { padding: 0; font-size: 0.65rem; }
            .dest-folder i { display: none; }
            .brand-center svg { width: 150px; height: 150px; }
            .brand-center h4 { font-size: 1.7rem; }
            .demo-stage { padding: 60px 20px; overflow: visible; }
            .bento-grid, .pricing-grid { grid-template-columns: 1fr; } 
            .pricing-card.ai-recommended { transform: scale(1); border-width: 2px; }
            .pricing-card.dimmed { opacity: 1; transform: scale(1); }
            .form-row, .task-grid { grid-template-columns: 1fr !important; } 
            .footer-grid { grid-template-columns: 1fr; text-align: center; gap: 40px; }
            .footer-col { align-items: center !important; display: flex; flex-direction: column; }
            .partner-links { justify-content: center; gap: 20px; }
            .nav-links { display: none; } 
            
            .doc-unit { transform: translate(-50%, -50%) !important; }
            @keyframes mobileIn { 0% { top: 5%; left: 50%; opacity: 0; transform
